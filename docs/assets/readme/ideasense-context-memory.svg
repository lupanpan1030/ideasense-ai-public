<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="820" viewBox="0 0 1120 820" role="img" aria-labelledby="title desc">
  <title id="title">IdeaSense context memory diagram</title>
  <desc id="desc">A layered hamburger-style diagram showing conversation being promoted into versioned product state, pending confirmations, stage artifacts, context cards, and final reports.</desc>
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1.2; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 34px; font-weight: 750; }
      .subtitle { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 500; }
      .label { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 21px; font-weight: 760; }
      .small { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 520; }
      .card-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 760; }
      .card-text { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 530; }
      .tiny { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 680; letter-spacing: 0.4px; }
      .quote { fill: #334155; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 760; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 6 8; marker-end: url(#arrowhead-muted); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="820" rx="28"/>
  <rect x="48" y="44" width="1024" height="760" rx="24" class="panel" filter="url(#soft-shadow)"/>

  <text x="96" y="104" class="title">How IdeaSense remembers context</text>
  <text x="96" y="136" class="subtitle">Conversation becomes versioned product state, not raw chat memory.</text>

  <text x="118" y="198" class="tiny">VOLATILE INPUT</text>

  <g transform="translate(94 176)">
    <path d="M 74 58 C 134 4, 454 4, 514 58 C 530 72, 516 96, 490 96 L 98 96 C 72 96, 58 72, 74 58 Z" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
    <text x="294" y="57" text-anchor="middle" class="label">Conversation</text>
    <text x="294" y="82" text-anchor="middle" class="small">user answers + assistant turns</text>

    <path class="arrow" d="M 294 104 L 294 132"/>

    <rect x="100" y="132" width="388" height="56" rx="28" fill="#fef3c7" stroke="#d97706" stroke-width="1.7"/>
    <text x="294" y="158" text-anchor="middle" class="label">Extraction + guards</text>
    <text x="294" y="179" text-anchor="middle" class="small">candidate fields must match controlled paths</text>

    <path class="arrow" d="M 294 196 L 294 224"/>

    <path d="M 72 224 L 516 224 L 478 292 L 110 292 Z" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.7"/>
    <text x="294" y="253" text-anchor="middle" class="label">pending_confirm</text>
    <text x="294" y="276" text-anchor="middle" class="small">accept / edit / reject uncertain AI suggestions</text>

    <path class="arrow" d="M 294 300 L 294 328"/>

    <rect x="42" y="328" width="504" height="86" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1.9"/>
    <text x="294" y="361" text-anchor="middle" class="label">project_states</text>
    <text x="294" y="386" text-anchor="middle" class="small">state_json + state_meta + state_version</text>

    <path class="arrow" d="M 294 422 L 294 450"/>

    <rect x="84" y="450" width="420" height="66" rx="33" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.7"/>
    <text x="294" y="477" text-anchor="middle" class="label">Stage Gate</text>
    <text x="294" y="500" text-anchor="middle" class="small">user confirms the current context version</text>

    <path class="arrow" d="M 294 524 L 294 552"/>

    <path d="M 78 570 C 138 624, 450 624, 510 570 C 528 554, 514 528, 488 528 L 100 528 C 74 528, 60 554, 78 570 Z" fill="#fed7aa" stroke="#ea580c" stroke-width="1.8"/>
    <text x="294" y="568" text-anchor="middle" class="label">Confirmed artifacts</text>
    <text x="294" y="594" text-anchor="middle" class="small">stage assessments + context cards + reports</text>
  </g>

  <g transform="translate(720 214)">
    <rect x="0" y="0" width="286" height="116" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="28" cy="34" r="7" fill="#2563eb"/>
    <text x="50" y="39" class="card-title">AI proposes</text>
    <text x="28" y="68" class="card-text">Models can produce candidate text,</text>
    <text x="28" y="88" class="card-text">structured fields, summaries,</text>
    <text x="28" y="108" class="card-text">scores, and report drafts.</text>

    <path class="dash" d="M 0 58 C -46 58, -72 54, -110 40"/>

    <rect x="0" y="150" width="286" height="136" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="28" cy="184" r="7" fill="#16a34a"/>
    <text x="50" y="189" class="card-title">Product state decides</text>
    <text x="28" y="218" class="card-text">The backend validates where output</text>
    <text x="28" y="238" class="card-text">may be stored, whether it is</text>
    <text x="28" y="258" class="card-text">confirmed, and whether the project</text>
    <text x="28" y="278" class="card-text">can advance to the next stage.</text>

    <path class="dash" d="M 0 222 C -48 222, -80 220, -122 206"/>

    <rect x="0" y="320" width="286" height="116" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="28" cy="354" r="7" fill="#ea580c"/>
    <text x="50" y="359" class="card-title">Reports stay auditable</text>
    <text x="28" y="388" class="card-text">Final artifacts carry the state</text>
    <text x="28" y="408" class="card-text">version they were generated from,</text>
    <text x="28" y="428" class="card-text">including assumptions and gaps.</text>
  </g>

  <rect x="720" y="684" width="286" height="54" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="748" y="716" class="quote">AI proposes; product state decides.</text>
</svg>
